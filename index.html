<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Studio | GitHub Pages</title>
    <style>
        :root {
            --bg-main: #313338;
            --bg-side: #2b2d31;
            --bg-input: #1e1f22;
            --text-main: #dbdee1;
            --blurple: #5865f2;
            --danger: #da373c;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 400px;
            background: var(--bg-side);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid #1e1f22;
            overflow-y: auto;
        }

        h2 { font-size: 1.2rem; margin-bottom: 5px; color: white; }
        label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: #b5bac1; }

        input, textarea {
            background: var(--bg-input);
            border: 1px solid #1e1f22;
            color: white;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        textarea { height: 80px; resize: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn { background: var(--blurple); color: white; }
        .send-btn:hover { background: #4752c4; }
        .clear-btn { background: var(--danger); color: white; opacity: 0.8; }
        .clear-btn:hover { opacity: 1; }

        /* Preview Area */
        .preview-area {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        .discord-msg-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #5865f2;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .msg-content-wrapper { flex: 1; }
        .bot-tag {
            background: var(--blurple);
            font-size: 0.65rem;
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 5px;
            vertical-align: middle;
        }

        .username { font-weight: bold; color: white; }
        .timestamp { font-size: 0.75rem; color: #949ba4; margin-left: 8px; }

        .main-text { margin-top: 5px; margin-bottom: 8px; line-height: 1.3; }

        .embed {
            background: #1e1f22;
            border-left: 4px solid #000;
            padding: 12px 16px;
            border-radius: 4px;
            display: inline-block;
            min-width: 300px;
            max-width: 520px;
        }

        .embed-title { color: #00a8fc; font-weight: bold; margin-bottom: 8px; cursor: pointer; }
        .embed-description { font-size: 0.9rem; color: #dbdee1; white-space: pre-wrap; }
        .embed-img { margin-top: 10px; max-width: 100%; border-radius: 4px; display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Webhook Settings</h2>
        
        <label>Webhook URL</label>
        <input type="password" id="url" placeholder="https://discord.com/api/webhooks/...">

        <label>Main Content</label>
        <textarea id="content" placeholder="Hello world!"></textarea>

        <hr style="border: 0; border-top: 1px solid #4e5058; width: 100%;">

        <label>Embed Title</label>
        <input type="text" id="title" placeholder="Cool Title">

        <label>Embed Description</label>
        <textarea id="desc" placeholder="This is the description..."></textarea>

        <label>Image URL</label>
        <input type="text" id="img" placeholder="https://site.com/image.png">

        <label>Embed Color</label>
        <input type="color" id="color" value="#5865f2">

        <div class="btn-group">
            <button class="send-btn" onclick="send()">Send Message</button>
            <button class="clear-btn" onclick="reset()">Reset</button>
        </div>
    </div>

    <div class="preview-area">
        <div class="discord-msg-container">
            <div class="avatar"></div>
            <div class="msg-content-wrapper">
                <span class="username">Webhook Bot</span>
                <span class="bot-tag">APP</span>
                <span class="timestamp">Today at 12:00 PM</span>
                <div class="main-text" id="p-content">Your message content will appear here.</div>
                
                <div class="embed" id="p-border">
                    <div class="embed-title" id="p-title">Embed Title</div>
                    <div class="embed-description" id="p-desc">This is how your embed description looks inside Discord.</div>
                    <img id="p-img" class="embed-img">
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['url', 'content', 'title', 'desc', 'img', 'color'];

        // Auto-load presets from LocalStorage
        window.onload = () => {
            inputs.forEach(id => {
                const val = localStorage.getItem('wh_' + id);
                if (val) document.getElementById(id).value = val;
            });
            update();
        };

        // Listen for changes to save and update preview
        document.addEventListener('input', (e) => {
            if (inputs.includes(e.target.id)) {
                localStorage.setItem('wh_' + e.target.id, e.target.value);
                update();
            }
        });

        function update() {
            const get = (id) => document.getElementById(id).value;
            
            document.getElementById('p-content').innerText = get('content') || " ";
            document.getElementById('p-title').innerText = get('title') || "Embed Title";
            document.getElementById('p-desc').innerText = get('desc') || "Description here...";
            document.getElementById('p-border').style.borderColor = get('color');
            
            const img = document.getElementById('p-img');
            if(get('img')) {
                img.src = get('img');
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }
        }

        async function send() {
            const url = document.getElementById('url').value;
            if(!url) return alert("Please enter a Webhook URL!");

            const payload = {
                content: document.getElementById('content').value,
                embeds: [{
                    title: document.getElementById('title').value,
                    description: document.getElementById('desc').value,
                    color: parseInt(document.getElementById('color').value.replace('#', ''), 16),
                    image: { url: document.getElementById('img').value }
                }]
            };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(res.ok) alert("✅ Webhook sent!");
                else alert("❌ Error: " + res.statusText);
            } catch (e) {
                alert("❌ Connection failed. Check your URL or Internet.");
            }
        }

        function reset() {
            if(confirm("Clear all saved data?")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
